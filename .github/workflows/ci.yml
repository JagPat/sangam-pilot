name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # The release gate (ADR-7): apply auth stub + roles + migrations, run the role-based SQL suites as
  # anon/authenticated/service_role against a real Postgres 16. Fails the build on any RLS/authorization
  # regression before anything deploys.
  db-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Run SQL suites (release gate)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: bash scripts/run-sql-suites.sh

  # App must typecheck and build. Supabase calls are all runtime, so placeholder env is enough to build.
  app-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - name: Build
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
        run: npm run build
